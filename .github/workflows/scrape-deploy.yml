name: Daily Price Scrape & Deploy

on:
  schedule:
    - cron: '0 7 * * *' # Every day at 07:00 UTC
  workflow_dispatch: # Allows manual trigger

jobs:
  scrape_and_deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: |
          npm init -y
          npm install playwright-core playwright playwright-stealth

      - name: Install Playwright Browsers
        run: npx playwright install --with-deps chromium

      - name: Run Scraper
        run: node scraper.js
        env:
          PRICERUNNER_URL: "https://www.pricerunner.dk/ct/72/Legetoej?retailer=17553%2C308%2C6836%2C1152%2C1196%2C2957%2C1170&c=price%2Cbrand%2C57121585%2C59583076%2C58387932%2Cmerchant"

      - name: Install lftp
        run: sudo apt-get update && sudo apt-get install -y lftp

      - name: FTP Deploy
        run: |
          lftp -e "set ftp:ssl-allow no; open -u ${{ secrets.FTP_USERNAME }},${{ secrets.FTP_PASSWORD }} ${{ secrets.FTP_SERVER }}; mirror -R --verbose --delete --exclude .git/ --exclude .github/ --exclude node_modules/ --exclude scraper.js --exclude package.json --exclude package-lock.json ./ public_html/pricedashboard/; quit"
